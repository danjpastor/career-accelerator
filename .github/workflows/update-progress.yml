name: Update Progress Dashboard

on:
  push:
    branches:
      - main
    paths:
      - "weeks/**"
      - "projects/**"
      - "resources/sql/datalemur/**"
      - "progress-data.yml"
      - "scripts/update_progress.py"
      - "requirements.txt"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-progress:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate progress files
        run: python scripts/update_progress.py

      - name: Commit generated updates
        run: |
          git config user.name "career-progress-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md PROGRESS.md weeks/

          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "progress: update automated dashboard"
            git push
          fi
