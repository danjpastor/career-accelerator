lesson_id: sql_foundations_select_alias
title: Selecting Columns and Using Aliases
order: 2
difficulty: beginner
description: Shape readable result sets with explicit columns and stakeholder-friendly aliases.
estimated_minutes: 35
content: lesson.md
objectives:
- Choose only the columns required by a question.
- Control result-column order.
- Create clear aliases with AS.
- Explain why aliases do not modify the source table.
key_takeaways:
- Explicit columns make saved queries safer.
- Aliases describe the result without changing the source.
- Readable names should preserve business meaning.
teaches:
- sql.column_selection
- sql.aliases
requires:
- sql.select_basics
mastery:
  passing_score: 1.0
activities:
- activity_id: select_projection_recognition
  title: Recognize projection
  type: recognition
  runtime: recognition
  prompt: Which query operation changes which columns appear while keeping all source rows?
  answer_options:
  - Selecting an explicit column list
  - Filtering with WHERE
  - Sorting with ORDER BY
  - Removing duplicates with DISTINCT
  hints: []
  validator:
    type: exact_answer
    expected_answer: Selecting an explicit column list
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 3
  presentation:
    scenario: Reporting design review
    introduction: A teammate is describing how a query changes the shape of a result.
    task: Identify the operation that controls result columns.
    table: products
    requirements:
    - Choose the option that affects columns rather than rows.
    expected_output: One selected answer.
    skills_practiced:
    - projection
    - result shape
    after_correct: An explicit SELECT list projects the requested columns while leaving row eligibility unchanged.
    common_errors: []
  instruction:
    title: Understand projection
    objective: Recognize the operation that changes result columns without filtering rows.
    action_label: Choose the operation
    body: 'In relational terminology, choosing columns is called **projection**. Projection changes the shape of
      the result horizontally: it controls which attributes appear. It does not determine which records qualify.


      ```sql

      SELECT account_id, plan_name

      FROM subscriptions;

      ```


      If the source contains seven rows and no filter is present, the result still contains seven rows. It simply
      contains fewer columns.


      This differs from **filtering**, which changes the result vertically by keeping only rows that satisfy a condition.
      Later, both operations can be combined:


      ```sql

      SELECT account_id, plan_name

      FROM subscriptions

      WHERE status = ''Active'';

      ```


      Here, `SELECT` projects columns and `WHERE` filters rows.


      The question asks specifically about changing which columns appear while retaining all source rows. Choose
      the operation that describes that behavior.'
  required_for_completion: true
- activity_id: select_guided
  title: Build a compact product catalog
  type: guided
  runtime: sql
  prompt: Return product_id, product_name, and unit_price from products.
  starter: "SELECT\n    -- choose the catalog columns\nFROM products;"
  solution: 'SELECT product_id, product_name, unit_price

    FROM products;'
  hints:
  - Begin with product_id so each row stays identifiable.
  - Separate product_id, product_name, and unit_price with commas.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: 'SELECT product_id, product_name, unit_price

      FROM products;'
    required_patterns:
    - product_id
    - product_name
    - unit_price
    forbidden_patterns: []
    order_sensitive: false
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 6
  presentation:
    scenario: Merchandising catalog extract
    introduction: The merchandising team needs a concise product reference without category or active-status fields.
    task: Create a three-column catalog view.
    table: products
    requirements:
    - Return exactly product_id, product_name, and unit_price.
    - Keep the columns in the requested order.
    expected_output: 7 rows and 3 columns.
    skills_practiced:
    - SELECT
    - column order
    after_correct: The explicit list documents the output schema and keeps every product identifiable.
    common_errors: []
  instruction:
    title: Design the result for its reader
    objective: Select a compact, stakeholder-ready set of fields.
    action_label: Build the catalog view
    body: 'Most business questions do not need every field in a table. A focused result is easier to inspect, export,
      explain, and validate.


      When choosing a column order, consider how a reader will scan the result:


      1. Put the stable identifier first.

      2. Follow it with the readable name or description.

      3. Place the measure or status that answers the question after the context fields.


      For example:


      ```sql

      SELECT service_id, service_name, monthly_cost

      FROM service_catalog;

      ```


      The identifier supports traceability, the name supports interpretation, and the measure supports comparison.


      The product table contains more fields than the catalog view needs. Return exactly `product_id`, `product_name`,
      and `unit_price` in that order. Do not add a filter, because the request covers every product.'
  required_for_completion: true
- activity_id: alias_guided
  title: Rename order_total for reporting
  type: guided
  runtime: sql
  prompt: Return order_id and order_total renamed as order_value from orders.
  starter: 'SELECT order_id, order_total

    FROM orders;'
  solution: 'SELECT order_id, order_total AS order_value

    FROM orders;'
  hints:
  - Keep order_id unchanged.
  - Place AS order_value immediately after order_total.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: 'SELECT order_id, order_total AS order_value

      FROM orders;'
    required_patterns:
    - order_total\s+AS\s+order_value
    forbidden_patterns: []
    order_sensitive: false
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 6
  presentation:
    scenario: Finance handoff
    introduction: A finance dashboard uses the business term order value instead of the source name order_total.
    task: Return the identifier and rename the measure in the result.
    table: orders
    requirements:
    - Return order_id first.
    - Alias order_total as order_value.
    - Do not rename the source table.
    expected_output: 8 rows with headings order_id and order_value.
    skills_practiced:
    - aliases
    - business naming
    after_correct: AS changes only the result heading, giving downstream readers a clearer label.
    common_errors: []
  instruction:
    title: Rename result columns with AS
    objective: Use an alias to make a source field clearer to a report reader.
    action_label: Add the reporting alias
    body: "An alias changes a column heading in the query result without renaming the source column.\n\n```sql\n\
      SELECT annual_value AS contract_value\nFROM contracts;\n```\n\nThe table still contains `annual_value`; only\
      \ the displayed heading becomes `contract_value`. Aliases are useful when a source name is technical, abbreviated,\
      \ or too vague for the audience.\n\nUse the explicit `AS` keyword while learning. Some SQL dialects allow\
      \ a space alone, but `AS` makes the intention unmistakable and reduces confusion during review.\n\nAliases\
      \ apply to individual expressions, so the comma belongs after the complete expression:\n\n```sql\nSELECT order_id,\n\
      \       order_total AS order_value\nFROM orders;\n```\n\nComplete the query so the monetary field appears\
      \ under the report-friendly heading `order_value`. Keep `order_id` unchanged."
  required_for_completion: true
- activity_id: alias_debug
  title: Repair an incomplete alias
  type: debugging
  runtime: sql
  prompt: Repair the query so monthly_fee is returned as recurring_revenue.
  starter: 'SELECT subscriber_id, monthly_fee AS

    FROM subscriptions;'
  solution: 'SELECT subscriber_id, monthly_fee AS recurring_revenue

    FROM subscriptions;'
  hints:
  - AS must be followed by the new result-column name.
  - Use recurring_revenue as the alias.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: 'SELECT subscriber_id, monthly_fee AS recurring_revenue

      FROM subscriptions;'
    required_patterns:
    - monthly_fee\s+AS\s+recurring_revenue
    forbidden_patterns: []
    order_sensitive: false
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 6
  presentation:
    scenario: Subscription report QA
    introduction: A saved query fails because its alias expression is unfinished.
    task: Complete the alias without changing the requested fields.
    table: subscriptions
    requirements:
    - Return subscriber_id and monthly_fee.
    - Name the second result column recurring_revenue.
    expected_output: 7 rows and 2 columns.
    skills_practiced:
    - debugging
    - AS syntax
    after_correct: An alias expression needs both the source expression and a complete result name.
    common_errors: []
  instruction:
    title: Treat an alias as a complete expression
    objective: Repair an alias that is missing its result name.
    action_label: Fix the alias
    body: 'Each item in a `SELECT` list must be a complete expression. When you use `AS`, the database expects a
      result name immediately after it.


      ```sql

      SELECT monthly_fee AS recurring_revenue

      FROM subscriptions;

      ```


      A dangling `AS` is incomplete, just as a comma with no following column is incomplete. When an alias query
      fails, inspect the expression from left to right:


      - Source expression: `monthly_fee`

      - Alias keyword: `AS`

      - Result heading: `recurring_revenue`


      The alias should be a valid, readable identifier. Avoid punctuation and unnecessary spaces unless the dialect
      and reporting need explicitly require quoted aliases.


      Repair the starter query by supplying the requested alias. Do not rename the source field elsewhere or remove
      the other selected columns.'
  required_for_completion: true
- activity_id: alias_mastery
  title: Create an account-plan view
  type: mastery
  runtime: sql
  prompt: Return subscriber_id as account_id and plan_name as subscription_plan from subscriptions.
  starter: 'SELECT

    FROM subscriptions;'
  solution: 'SELECT subscriber_id AS account_id, plan_name AS subscription_plan

    FROM subscriptions;'
  hints:
  - Alias each selected source column separately.
  - Use a comma between the two aliased expressions.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: 'SELECT subscriber_id AS account_id, plan_name AS subscription_plan

      FROM subscriptions;'
    required_patterns:
    - subscriber_id\s+AS\s+account_id
    - plan_name\s+AS\s+subscription_plan
    forbidden_patterns: []
    order_sensitive: false
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
  difficulty: beginner
  estimated_minutes: 8
  presentation:
    scenario: Customer-success export
    introduction: Customer Success needs a clean two-column account-and-plan export for a workflow tool.
    task: Create the requested result with stakeholder-friendly headings.
    table: subscriptions
    requirements:
    - Return exactly two columns.
    - Alias subscriber_id as account_id.
    - Alias plan_name as subscription_plan.
    expected_output: 7 rows with headings account_id and subscription_plan.
    skills_practiced:
    - independent SELECT
    - multiple aliases
    after_correct: The result is concise, readable, and stable because both source fields are explicitly selected
      and clearly renamed.
    common_errors: []
  instruction:
    title: Create a reader-friendly two-column view
    objective: Independently select and alias multiple fields.
    action_label: Build the account-plan view
    body: "A strong result set balances source traceability with reader-friendly headings. You can alias more than\
      \ one selected field:\n\n```sql\nSELECT member_id AS account_id,\n       membership_tier AS plan_name\nFROM\
      \ memberships;\n```\n\nEach alias applies only to the expression directly before it. Commas still separate\
      \ the complete expressions.\n\nBefore writing, translate the request into a small output contract:\n\n- First\
      \ result column: source `subscriber_id`, displayed as `account_id`\n- Second result column: source `plan_name`,\
      \ displayed as `subscription_plan`\n- Source table: `subscriptions`\n- Rows: all subscriptions\n\nThis is\
      \ the lesson’s independent mastery step. Build the query without copying a previous solution. If you view\
      \ the full solution, you can still practice, but you must pass a later unassisted attempt to demonstrate mastery."
  required_for_completion: true
