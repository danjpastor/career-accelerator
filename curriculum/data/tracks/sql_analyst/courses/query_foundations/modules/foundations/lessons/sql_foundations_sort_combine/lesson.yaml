lesson_id: sql_foundations_sort_combine
title: Sorting and Combining Foundation Clauses
order: 5
difficulty: beginner
description: Order results intentionally and combine foundation clauses into complete business queries.
estimated_minutes: 45
content: lesson.md
objectives:
- Sort text, numeric, and date values in either direction.
- Use multiple sort keys.
- Place SQL clauses in valid order.
- Build top-N queries with filtering, sorting, and limiting.
key_takeaways:
- A meaningful top-N result requires ORDER BY before LIMIT.
- Multiple sort keys apply from left to right.
- Build and test complex queries incrementally.
teaches:
- sql.order_by
- sql.clause_composition
requires:
- sql.where
- sql.column_selection
mastery:
  passing_score: 1.0
activities:
- activity_id: sort_direction_recognition
  title: Choose the correct sort direction
  type: recognition
  runtime: recognition
  prompt: Which clause places the oldest opened_date values first?
  answer_options:
  - ORDER BY opened_date ASC
  - ORDER BY opened_date DESC
  - LIMIT opened_date
  - WHERE opened_date FIRST
  hints: []
  validator:
    type: exact_answer
    expected_answer: ORDER BY opened_date ASC
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 3
  presentation:
    scenario: Queue-order definition
    introduction: A support manager wants the records that have waited the longest to appear first.
    task: Choose the sort direction that places older dates before newer dates.
    table: support_tickets
    requirements:
    - Interpret oldest first literally.
    expected_output: One selected answer.
    skills_practiced:
    - ORDER BY
    - ASC
    after_correct: Ascending date order moves earlier calendar values to the top.
    common_errors: []
- activity_id: sort_guided
  title: Rank products by price
  type: guided
  runtime: sql
  prompt: Return product_name and unit_price from products, highest unit_price first.
  starter: 'SELECT product_name, unit_price

    FROM products

    '
  solution: 'SELECT product_name, unit_price

    FROM products

    ORDER BY unit_price DESC;'
  hints:
  - Sort on unit_price.
  - Highest first requires DESC.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: 'SELECT product_name, unit_price

      FROM products

      ORDER BY unit_price DESC;'
    required_patterns:
    - ORDER\s+BY\s+unit_price\s+DESC
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 6
  presentation:
    scenario: Merchandising price review
    introduction: The merchandising team wants to inspect the most expensive catalog items first.
    task: Sort the product list from highest to lowest price.
    table: products
    requirements:
    - Return product_name and unit_price.
    - Order by unit_price descending.
    expected_output: 7 rows and 2 columns, beginning with Keyboard Stand.
    skills_practiced:
    - ORDER BY
    - DESC
    after_correct: Descending numeric order places the largest price at the top.
    common_errors: []
- activity_id: sort_multiple_keys
  title: Sort subscriptions by region and fee
  type: independent
  runtime: sql
  prompt: Return region, plan_name, and monthly_fee from subscriptions. Sort region A–Z, then monthly_fee highest
    to lowest within each region.
  starter: 'SELECT region, plan_name, monthly_fee

    FROM subscriptions

    '
  solution: 'SELECT region, plan_name, monthly_fee

    FROM subscriptions

    ORDER BY region ASC, monthly_fee DESC;'
  hints:
  - List the primary sort key first.
  - Use ASC for region and DESC for monthly_fee.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: 'SELECT region, plan_name, monthly_fee

      FROM subscriptions

      ORDER BY region ASC, monthly_fee DESC;'
    required_patterns:
    - ORDER\s+BY\s+region\s+ASC\s*,\s*monthly_fee\s+DESC
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 6
  presentation:
    scenario: Regional plan review
    introduction: The growth team wants subscriptions grouped by region and then ranked by value inside each region.
    task: Apply two sort keys in the requested priority.
    table: subscriptions
    requirements:
    - Sort region ascending first.
    - Sort monthly_fee descending second.
    expected_output: 7 ordered rows and 3 columns.
    skills_practiced:
    - multi-column sorting
    - sort priority
    after_correct: SQL groups equal region values through the first key and ranks fees within those groups through
      the second.
    common_errors: []
- activity_id: combine_top_orders
  title: Build a top-order report
  type: transfer
  runtime: sql
  prompt: Return order_id, region, and order_total for Completed orders. Sort highest order_total first and return
    only three rows.
  starter: 'SELECT order_id, region, order_total

    FROM orders

    '
  solution: 'SELECT order_id, region, order_total

    FROM orders

    WHERE status = ''Completed''

    ORDER BY order_total DESC

    LIMIT 3;'
  hints:
  - Filter Completed rows before sorting.
  - Sort order_total DESC, then use LIMIT 3.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: 'SELECT order_id, region, order_total

      FROM orders

      WHERE status = ''Completed''

      ORDER BY order_total DESC

      LIMIT 3;'
    required_patterns:
    - status\s*=\s*'Completed'
    - ORDER\s+BY\s+order_total\s+DESC
    - LIMIT\s+3
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 6
  presentation:
    scenario: Executive sales snapshot
    introduction: Leadership wants the three largest completed orders, excluding work that is processing or cancelled.
    task: Combine a status filter, descending value sort, and row limit.
    table: orders
    requirements:
    - Return order_id, region, and order_total.
    - Keep Completed orders only.
    - Rank by order_total descending.
    - Return exactly the top three rows.
    expected_output: 3 rows and 3 columns, beginning with order O308.
    skills_practiced:
    - WHERE
    - ORDER BY
    - LIMIT
    - top-N
    after_correct: Filtering defines the eligible population, sorting identifies the largest values, and LIMIT returns
      the requested top three.
    common_errors: []
- activity_id: combine_debug_clause_order
  title: Repair clause order
  type: debugging
  runtime: sql
  prompt: Repair the query so it returns Active subscriptions ordered by monthly_fee descending.
  starter: 'SELECT subscriber_id, plan_name, monthly_fee

    FROM subscriptions

    ORDER BY monthly_fee DESC

    WHERE status = ''Active'';'
  solution: 'SELECT subscriber_id, plan_name, monthly_fee

    FROM subscriptions

    WHERE status = ''Active''

    ORDER BY monthly_fee DESC;'
  hints:
  - WHERE must appear before ORDER BY.
  - Move the status filter above the sorting clause.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: 'SELECT subscriber_id, plan_name, monthly_fee

      FROM subscriptions

      WHERE status = ''Active''

      ORDER BY monthly_fee DESC;'
    required_patterns:
    - WHERE\s+status\s*=\s*'Active'\s+ORDER\s+BY\s+monthly_fee\s+DESC
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 6
  presentation:
    scenario: Subscription query review
    introduction: A query contains the correct ideas but places them in an invalid structural order.
    task: Move the clauses into valid SQL order without changing the business rule.
    table: subscriptions
    requirements:
    - Filter Active rows.
    - Sort monthly_fee descending.
    - Keep the selected columns unchanged.
    expected_output: 4 ordered rows and 3 columns.
    skills_practiced:
    - clause order
    - debugging
    after_correct: SQL requires WHERE before ORDER BY because filtering is defined before result ordering.
    common_errors: []
- activity_id: sort_mastery
  title: Prioritize the oldest unresolved tickets
  type: mastery
  runtime: sql
  prompt: Return ticket_id, priority, status, assigned_team, and opened_date for Open or Pending tickets. Sort oldest
    first and return only five rows.
  starter: 'SELECT

    FROM support_tickets

    '
  solution: 'SELECT ticket_id, priority, status, assigned_team, opened_date

    FROM support_tickets

    WHERE status IN (''Open'', ''Pending'')

    ORDER BY opened_date ASC

    LIMIT 5;'
  hints:
  - Filter the accepted unresolved statuses first.
  - Oldest first means ASC; add LIMIT 5 last.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: 'SELECT ticket_id, priority, status, assigned_team, opened_date

      FROM support_tickets

      WHERE status IN (''Open'', ''Pending'')

      ORDER BY opened_date ASC

      LIMIT 5;'
    required_patterns:
    - status\s+IN\s*\(
    - ORDER\s+BY\s+opened_date\s+ASC
    - LIMIT\s+5
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
  difficulty: beginner
  estimated_minutes: 10
  presentation:
    scenario: Backlog triage
    introduction: The support lead needs a five-row action list that surfaces the longest-waiting unresolved work.
    task: Build the full query independently.
    table: support_tickets
    requirements:
    - Return exactly the five requested columns.
    - Accept Open and Pending statuses.
    - Sort opened_date oldest first.
    - Return only five rows.
    expected_output: 5 ordered rows and 5 columns, beginning with ticket T1006.
    skills_practiced:
    - query composition
    - top-N workflow
    - date sorting
    after_correct: The query defines the unresolved population, places the oldest work first, and limits the result
      to a manageable action list.
    common_errors: []
