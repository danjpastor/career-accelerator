- activity_id: left_join_mastery
  title: Find customers without orders
  type: mastery
  runtime: sql
  prompt: Return customer_id and customer_name for customers with no matching order. Sort by customer_id.
  starter: "SELECT c.customer_id, c.customer_name\nFROM customers AS c\nLEFT JOIN orders AS o\n  ON c.customer_id\
    \ = o.customer_id\nWHERE \nORDER BY c.customer_id;"
  solution: SELECT c.customer_id, c.customer_name FROM customers AS c LEFT JOIN orders AS o ON c.customer_id = o.customer_id
    WHERE o.order_id IS NULL ORDER BY c.customer_id;
  hints:
  - Start from the requested result grain, then apply anti-join pattern.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT c.customer_id, c.customer_name FROM customers AS c LEFT JOIN orders AS o ON c.customer_id
      = o.customer_id WHERE o.order_id IS NULL ORDER BY c.customer_id;
    required_patterns:
    - LEFT\s+JOIN
    - o\.order_id\s+IS\s+NULL
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
