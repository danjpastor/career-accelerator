  title: Choose the preserved table
  type: recognition
  runtime: recognition
  prompt: In a LEFT JOIN, which table keeps all of its rows?
  answer_options:
  - The table written before LEFT JOIN
  - The table written after LEFT JOIN
  - Both tables always
  - Neither table
  hints:
  - Focus on how LEFT JOIN preservation changes the result or database behavior.
  validator:
