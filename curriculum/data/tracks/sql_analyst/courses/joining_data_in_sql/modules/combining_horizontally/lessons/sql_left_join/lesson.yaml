- activity_id: left_join_guided
  title: Keep every customer
  type: guided
  runtime: sql
  prompt: Return customer_id, customer_name, and order_id for all customers, including customers without orders.
    Sort by customer_id and order_id.
  starter: "SELECT c.customer_id, c.customer_name, o.order_id\nFROM customers AS c\nLEFT JOIN orders AS o\n  ON\
    \ c.customer_id = o.customer_id\nORDER BY c.customer_id, o.order_id;"
  solution: SELECT c.customer_id, c.customer_name, o.order_id FROM customers AS c LEFT JOIN orders AS o ON c.customer_id
    = o.customer_id ORDER BY c.customer_id, o.order_id;
  hints:
  - Identify where LEFT JOIN belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT c.customer_id, c.customer_name, o.order_id FROM customers AS c LEFT JOIN orders AS o
      ON c.customer_id = o.customer_id ORDER BY c.customer_id, o.order_id;
    required_patterns:
    - LEFT\s+JOIN
    - ON\s+c\.customer_id\s*=\s*o\.customer_id
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 7
