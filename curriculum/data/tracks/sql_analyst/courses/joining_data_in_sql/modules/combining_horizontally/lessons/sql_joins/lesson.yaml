- activity_id: join_guided
  title: Connect orders to support tickets
  type: guided
  runtime: sql
  prompt: Return order_id, customer_id, and ticket_id for every order. Sort by order_id and ticket_id.
  starter: 'SELECT o.order_id, o.customer_id, t.ticket_id

    FROM orders AS o

    -- join support_tickets as t'
  solution: SELECT o.order_id, o.customer_id, t.ticket_id FROM orders AS o LEFT JOIN support_tickets AS t ON o.customer_id
    = t.customer_id ORDER BY o.order_id, t.ticket_id;
  hints:
  - Focus on LEFT JOIN.
  - Build the result one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT o.order_id, o.customer_id, t.ticket_id FROM orders AS o LEFT JOIN support_tickets AS
      t ON o.customer_id = t.customer_id ORDER BY o.order_id, t.ticket_id;
    required_patterns:
    - LEFT\s+JOIN
    - \bON\b
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
