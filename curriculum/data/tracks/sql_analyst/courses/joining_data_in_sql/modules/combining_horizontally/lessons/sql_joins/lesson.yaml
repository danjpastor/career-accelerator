- activity_id: join_mastery
  title: Count support tickets per ordering customer
  type: mastery
  runtime: sql
  prompt: Return customer_id and ticket_count for every customer in orders. Sort by customer_id.
  starter: "SELECT o.customer_id,\nFROM orders AS o\nLEFT JOIN support_tickets AS t\n  ON o.customer_id = t.customer_id\n\
    GROUP BY o.customer_id;"
  solution: SELECT o.customer_id, COUNT(t.ticket_id) AS ticket_count FROM orders AS o LEFT JOIN support_tickets
    AS t ON o.customer_id = t.customer_id GROUP BY o.customer_id ORDER BY o.customer_id;
  hints:
  - Focus on join validation and aggregation.
  - Build the result one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT o.customer_id, COUNT(t.ticket_id) AS ticket_count FROM orders AS o LEFT JOIN support_tickets
      AS t ON o.customer_id = t.customer_id GROUP BY o.customer_id ORDER BY o.customer_id;
    required_patterns:
    - LEFT\s+JOIN
    - COUNT\s*\(
    - GROUP\s+BY
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
