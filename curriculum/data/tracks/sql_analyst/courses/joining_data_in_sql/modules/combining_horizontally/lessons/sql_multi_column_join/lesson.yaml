- activity_id: multi_join_guided
  title: Compare sales with targets
  type: guided
  runtime: sql
  prompt: Return region, month_start, sales_total, and sales_target by joining monthly_sales to monthly_targets
    on region and month_start. Sort by region and month_start.
  starter: "SELECT s.region, s.month_start, s.sales_total, t.sales_target\nFROM monthly_sales AS s\nJOIN monthly_targets\
    \ AS t\n  ON s.region = t.region\n AND s.month_start = t.month_start\nORDER BY s.region, s.month_start;"
  solution: SELECT s.region, s.month_start, s.sales_total, t.sales_target FROM monthly_sales AS s INNER JOIN monthly_targets
    AS t ON s.region = t.region AND s.month_start = t.month_start ORDER BY s.region, s.month_start;
  hints:
  - Identify where multi-column joins belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT s.region, s.month_start, s.sales_total, t.sales_target FROM monthly_sales AS s INNER
      JOIN monthly_targets AS t ON s.region = t.region AND s.month_start = t.month_start ORDER BY s.region, s.month_start;
    required_patterns:
    - JOIN\s+monthly_targets
    - s\.region\s*=\s*t\.region
    - s\.month_start\s*=\s*t\.month_start
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
