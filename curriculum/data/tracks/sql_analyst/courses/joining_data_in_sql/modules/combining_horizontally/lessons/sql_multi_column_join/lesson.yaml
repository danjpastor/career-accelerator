- activity_id: multi_join_mastery
  title: Calculate target variance
  type: mastery
  runtime: sql
  prompt: Return region, month_start, and variance_to_target as sales_total - sales_target. Sort by region and month_start.
  starter: "SELECT s.region, s.month_start,\n       \nFROM monthly_sales AS s\nJOIN monthly_targets AS t\n  ON \n\
    ORDER BY s.region, s.month_start;"
  solution: SELECT s.region, s.month_start, s.sales_total - t.sales_target AS variance_to_target FROM monthly_sales
    AS s INNER JOIN monthly_targets AS t ON s.region = t.region AND s.month_start = t.month_start ORDER BY s.region,
    s.month_start;
  hints:
  - Start from the requested result grain, then apply composite-key join metrics.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT s.region, s.month_start, s.sales_total - t.sales_target AS variance_to_target FROM monthly_sales
      AS s INNER JOIN monthly_targets AS t ON s.region = t.region AND s.month_start = t.month_start ORDER BY s.region,
      s.month_start;
    required_patterns:
    - sales_total\s*-\s*t\.sales_target
    - \bAND\b
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
