  title: Join orders to customers
  type: mastery
  runtime: sql
  prompt: Return order_id and customer_name, sorted by order_id.
  starter: ''
  solution: SELECT o.order_id, c.customer_name FROM orders o INNER JOIN customers c ON o.customer_id = c.customer_id
    ORDER BY o.order_id;
