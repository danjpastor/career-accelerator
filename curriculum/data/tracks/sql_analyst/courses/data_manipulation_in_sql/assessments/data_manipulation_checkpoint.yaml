- activity_id: manip_cp_4_question
  title: Rank orders by value
  type: mastery
  runtime: sql
  prompt: Return order_id, order_total, and value_rank using RANK ordered by order_total descending. Sort by value_rank
    and order_id.
  starter: ''
  solution: SELECT order_id, order_total, RANK() OVER (ORDER BY order_total DESC) AS value_rank FROM orders ORDER
    BY value_rank, order_id;
  hints:
  - Start from the requested result grain, then apply rank orders by value.
  validator:
    type: sql_result
    dataset_id: sql_foundations
