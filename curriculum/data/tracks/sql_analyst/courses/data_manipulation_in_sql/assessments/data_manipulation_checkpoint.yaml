- activity_id: manip_cp_2_question
  title: Find above-average orders
  type: mastery
  runtime: sql
  prompt: Return order_id and order_total for orders above the overall average, sorted by order_id.
  starter: ''
  solution: SELECT order_id, order_total FROM orders WHERE order_total > (SELECT AVG(order_total) FROM orders) ORDER
    BY order_id;
  hints:
