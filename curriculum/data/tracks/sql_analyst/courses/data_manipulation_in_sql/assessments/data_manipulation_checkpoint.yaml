- activity_id: manip_cp_1_question
  title: Classify order workflow
  type: mastery
  runtime: sql
  prompt: 'Return order_id and workflow: Done for Completed, Active for Processing, otherwise Review. Sort by order_id.'
  starter: ''
  solution: SELECT order_id, CASE WHEN status='Completed' THEN 'Done' WHEN status='Processing' THEN 'Active' ELSE
    'Review' END AS workflow FROM orders ORDER BY order_id;
  hints:
  - Start from the requested result grain, then apply classify order workflow.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, CASE WHEN status='Completed' THEN 'Done' WHEN status='Processing' THEN 'Active'
      ELSE 'Review' END AS workflow FROM orders ORDER BY order_id;
