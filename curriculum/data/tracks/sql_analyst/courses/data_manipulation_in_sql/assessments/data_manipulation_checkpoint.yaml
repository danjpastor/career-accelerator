- activity_id: manip_cp_3_question
  title: Build a CTE summary
  type: mastery
  runtime: sql
  prompt: Use a CTE to return region and total_order_value, sorted by region.
  starter: ''
  solution: WITH regional AS (SELECT region, SUM(order_total) AS total_order_value FROM orders GROUP BY region)
    SELECT region, total_order_value FROM regional ORDER BY region;
  hints:
  - Start from the requested result grain, then apply build a cte summary.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: WITH regional AS (SELECT region, SUM(order_total) AS total_order_value FROM orders GROUP BY
      region) SELECT region, total_order_value FROM regional ORDER BY region;
    required_patterns:
    - ^WITH
    - GROUP\s+BY
