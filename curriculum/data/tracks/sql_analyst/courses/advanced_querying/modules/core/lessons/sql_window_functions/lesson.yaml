- activity_id: window_guided
  title: Number orders within each region
  type: guided
  runtime: sql
  prompt: Return order_id, region, order_total, and region_order_number using ROW_NUMBER ordered by order_total
    descending within each region. Sort the final result by region and region_order_number.
  starter: "SELECT order_id, region, order_total,\n       ROW_NUMBER() OVER (\n       ) AS region_order_number\n\
    FROM orders;"
  solution: SELECT order_id, region, order_total, ROW_NUMBER() OVER (PARTITION BY region ORDER BY order_total DESC)
    AS region_order_number FROM orders ORDER BY region, region_order_number;
  hints:
  - Focus on ROW_NUMBER and PARTITION BY.
  - Build the result one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, region, order_total, ROW_NUMBER() OVER (PARTITION BY region ORDER BY order_total
      DESC) AS region_order_number FROM orders ORDER BY region, region_order_number;
    required_patterns:
    - ROW_NUMBER\s*\(
    - PARTITION\s+BY
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
