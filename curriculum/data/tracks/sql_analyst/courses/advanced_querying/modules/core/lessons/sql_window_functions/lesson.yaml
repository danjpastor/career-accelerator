- activity_id: window_mastery
  title: Calculate a running order total
  type: mastery
  runtime: sql
  prompt: Return order_id, order_date, order_total, and running_order_total ordered by order_date and order_id.
  starter: 'SELECT order_id, order_date, order_total,

    FROM orders

    ORDER BY order_date, order_id;'
  solution: SELECT order_id, order_date, order_total, SUM(order_total) OVER (ORDER BY order_date, order_id ROWS
    BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_order_total FROM orders ORDER BY order_date, order_id;
  hints:
  - Focus on running totals.
  - Build the result one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, order_date, order_total, SUM(order_total) OVER (ORDER BY order_date, order_id
      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_order_total FROM orders ORDER BY order_date,
      order_id;
    required_patterns:
    - SUM\s*\(.+OVER
    - ORDER\s+BY
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
