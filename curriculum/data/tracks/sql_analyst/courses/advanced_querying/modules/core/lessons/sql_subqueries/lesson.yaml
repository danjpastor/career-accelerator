- activity_id: subquery_guided
  title: Find above-average orders
  type: guided
  runtime: sql
  prompt: Return order_id and order_total for orders above the overall average order_total. Sort by order_id.
  starter: "SELECT order_id, order_total\nFROM orders\nWHERE order_total > (\n    -- calculate the overall average\n\
    )\nORDER BY order_id;"
  solution: SELECT order_id, order_total FROM orders WHERE order_total > (SELECT AVG(order_total) FROM orders) ORDER
    BY order_id;
  hints:
  - Focus on scalar subquery.
  - Build the result one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, order_total FROM orders WHERE order_total > (SELECT AVG(order_total) FROM orders)
      ORDER BY order_id;
    required_patterns:
    - WHERE.+\(\s*SELECT
    - AVG\s*\(
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 8
  presentation:
    scenario: Analyst practice request
    introduction: Translate the request into a clear, reviewable SQL result.
    task: Return order_id and order_total for orders above the overall average order_total. Sort by order_id.
    tables:
    - orders
    requirements:
    - Return the requested fields and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested columns.
    skills_practiced:
    - scalar subquery
    after_correct: Your query returns the requested result and uses the intended SQL pattern.
    common_errors: []
  instruction:
    title: Compare rows with a calculated benchmark
    objective: Use scalar subquery in a realistic analyst query.
    action_label: Write and validate the query
    body: The inner query calculates one benchmark. The outer query uses it to filter individual rows.
  required_for_completion: true
- activity_id: subquery_mastery
  title: Find customers with urgent tickets
  type: mastery
  runtime: sql
  prompt: Return order_id and customer_id for orders placed by customers who have an Urgent support ticket. Sort
    by order_id.
  starter: 'SELECT order_id, customer_id

    FROM orders

    WHERE customer_id IN (

    );'
  solution: SELECT order_id, customer_id FROM orders WHERE customer_id IN (SELECT customer_id FROM support_tickets
    WHERE priority = 'Urgent') ORDER BY order_id;
  hints:
  - Focus on list-returning subquery.
  - Build the result one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, customer_id FROM orders WHERE customer_id IN (SELECT customer_id FROM support_tickets
      WHERE priority = 'Urgent') ORDER BY order_id;
    required_patterns:
    - \bIN\s*\(\s*SELECT
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
