  required_for_completion: true
- activity_id: cte_mastery
  title: Find orders above their regional average
  type: mastery
  runtime: sql
  prompt: Return order_id, region, and order_total when an order is above the average for its own region. Sort by
    order_id.
  starter: 'SELECT o.order_id, o.region, o.order_total

    FROM orders AS o

    WHERE o.order_total > (

    );'
  solution: SELECT o.order_id, o.region, o.order_total FROM orders AS o WHERE o.order_total > (SELECT AVG(o2.order_total)
    FROM orders AS o2 WHERE o2.region = o.region) ORDER BY o.order_id;
  hints:
  - Focus on correlated subquery.
  - Build the result one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT o.order_id, o.region, o.order_total FROM orders AS o WHERE o.order_total > (SELECT AVG(o2.order_total)
      FROM orders AS o2 WHERE o2.region = o.region) ORDER BY o.order_id;
    required_patterns:
    - SELECT\s+AVG
    - o2\.region\s*=\s*o\.region
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
  difficulty: intermediate
  estimated_minutes: 10
  presentation:
    scenario: Analyst practice request
    introduction: Translate the request into a clear, reviewable SQL result.
    task: Return order_id, region, and order_total when an order is above the average for its own region. Sort by
      order_id.
    tables:
    - orders
    requirements:
    - Return the requested fields and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested columns.
