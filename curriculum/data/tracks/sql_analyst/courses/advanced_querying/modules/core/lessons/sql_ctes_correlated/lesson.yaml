- activity_id: cte_guided
  title: Summarize regional order totals
  type: guided
  runtime: sql
  prompt: Use a CTE named regional_orders to calculate total_order_value by region, then return it sorted by region.
  starter: "WITH regional_orders AS (\n    -- build the regional summary\n)\nSELECT *\nFROM regional_orders\nORDER\
    \ BY region;"
  solution: WITH regional_orders AS (SELECT region, SUM(order_total) AS total_order_value FROM orders GROUP BY region)
    SELECT region, total_order_value FROM regional_orders ORDER BY region;
  hints:
  - Focus on CTE.
  - Build the result one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: WITH regional_orders AS (SELECT region, SUM(order_total) AS total_order_value FROM orders GROUP
      BY region) SELECT region, total_order_value FROM regional_orders ORDER BY region;
    required_patterns:
    - ^\s*WITH\b
    - GROUP\s+BY
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 8
  presentation:
