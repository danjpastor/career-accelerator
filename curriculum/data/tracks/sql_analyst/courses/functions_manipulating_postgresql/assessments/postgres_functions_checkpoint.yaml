  title: Extract order year
  type: mastery
  runtime: sql
  prompt: Return order_id and order_year using EXTRACT, sorted by order_id.
  starter: ''
  solution: SELECT order_id, EXTRACT(YEAR FROM order_date) AS order_year FROM orders ORDER BY order_id;
  hints:
  - Start from the requested result grain, then apply extract order year.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, EXTRACT(YEAR FROM order_date) AS order_year FROM orders ORDER BY order_id;
