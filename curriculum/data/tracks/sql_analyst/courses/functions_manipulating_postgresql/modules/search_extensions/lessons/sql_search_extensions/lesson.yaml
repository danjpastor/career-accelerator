  type: recognition
  runtime: recognition
  prompt: A team needs relevance-ranked document search across thousands of long text fields. Which feature is designed
    for that workload?
  answer_options:
  - Full-text search with an indexed document representation
  - A simple ORDER BY only
  - A numeric AVG
  - A CROSS JOIN
  hints:
  - Focus on how full-text search and postgresql extensions changes the result or database behavior.
  validator:
