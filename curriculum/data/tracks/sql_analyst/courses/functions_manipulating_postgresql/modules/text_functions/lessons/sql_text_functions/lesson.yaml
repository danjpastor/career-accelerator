activities:
- activity_id: text_func_recognition
  title: Choose a cleanup function
  type: recognition
  runtime: recognition
  prompt: Which function removes leading and trailing spaces?
  answer_options:
  - TRIM
  - ROUND
  - DATE_TRUNC
  - COUNT
  hints:
  - Focus on how text cleanup changes the result or database behavior.
  validator:
    type: exact_answer
    expected_answer: TRIM
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 4
  presentation:
    scenario: Quick analyst decision
    introduction: Use the concept from this step to choose the strongest answer.
    task: Which function removes leading and trailing spaces?
    requirements:
    - Choose one answer.
    - Check your answer before continuing.
    expected_output: One correct selection.
    skills_practiced:
    - text cleanup
    after_correct: You correctly applied text cleanup to the decision.
    common_errors: []
  instruction:
    title: Choose a cleanup function
    objective: Use text cleanup in a practical analyst decision.
    action_label: Choose the best answer
    body: Analysts use **text cleanup** to make database work more accurate, readable, and useful. Read the situation,
      identify what the result must preserve, and then choose the option that best matches that goal. This check
      is intentionally short so you can test the idea immediately.
  required_for_completion: true
- activity_id: text_func_guided
  title: Create standardized product labels
  type: guided
  runtime: sql
  prompt: 'Return product_id and product_label as UPPER(category) || '': '' || product_name. Sort by product_id.'
  starter: 'SELECT product_id, UPPER(category) || '': '' || product_name AS product_label

    FROM products

    ORDER BY product_id;'
  solution: 'SELECT product_id, UPPER(category) || '': '' || product_name AS product_label FROM products ORDER BY
    product_id;'
  hints:
  - Identify where text concatenation belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: 'SELECT product_id, UPPER(category) || '': '' || product_name AS product_label FROM products
      ORDER BY product_id;'
    required_patterns:
    - UPPER\s*\(
    - \|\|
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 7
  presentation:
    scenario: Original analyst practice request
    introduction: Translate the business request into a focused, reviewable SQL result.
    task: 'Return product_id and product_label as UPPER(category) || '': '' || product_name. Sort by product_id.'
    tables:
    - products
    requirements:
    - Return the requested columns and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested rows and columns.
    skills_practiced:
    - text concatenation
    after_correct: Your query returns the requested result and uses the intended SQL pattern.
    common_errors: []
  instruction:
    title: Create standardized product labels
    objective: Apply text concatenation to a realistic analyst request.
    action_label: Write and validate the query
    body: In this step, you will use **text concatenation** inside a complete analyst query. Start by identifying
      the result grain—what one row should represent—then select only the fields and calculations needed to answer
      the request. Run the query, inspect the output, and check the answer when the result looks right.
  required_for_completion: true
- activity_id: text_func_mastery
  title: Extract customer initials
  type: mastery
  runtime: sql
  prompt: Return customer_id and first_initial as the first character of customer_name in uppercase. Sort by customer_id.
  starter: "SELECT customer_id,\n       \nFROM customers\nORDER BY customer_id;"
  solution: SELECT customer_id, UPPER(SUBSTR(customer_name, 1, 1)) AS first_initial FROM customers ORDER BY customer_id;
  hints:
  - Start from the requested result grain, then apply text extraction.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT customer_id, UPPER(SUBSTR(customer_name, 1, 1)) AS first_initial FROM customers ORDER
      BY customer_id;
    required_patterns:
    - SUBSTR\s*\(
    - UPPER\s*\(
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
  difficulty: intermediate
  estimated_minutes: 7
  presentation:
    scenario: Original analyst practice request
    introduction: Translate the business request into a focused, reviewable SQL result.
    task: Return customer_id and first_initial as the first character of customer_name in uppercase. Sort by customer_id.
    tables:
    - customers
    requirements:
    - Return the requested columns and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested rows and columns.
    skills_practiced:
    - text extraction
    after_correct: Your query returns the requested result and uses the intended SQL pattern.
    common_errors: []
