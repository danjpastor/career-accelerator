- activity_id: date_time_guided
  title: Create monthly order periods
  type: guided
  runtime: sql
  prompt: Return order_id and order_month using DATE_TRUNC('month', order_date). Sort by order_id.
  starter: 'SELECT order_id, DATE_TRUNC(''month'', order_date) AS order_month

    FROM orders

    ORDER BY order_id;'
  solution: SELECT order_id, DATE_TRUNC('month', order_date) AS order_month FROM orders ORDER BY order_id;
  hints:
  - Identify where date period truncation belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, DATE_TRUNC('month', order_date) AS order_month FROM orders ORDER BY order_id;
    required_patterns:
    - DATE_TRUNC\s*\(
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
