- activity_id: date_time_recognition
  title: Choose a monthly grain
  type: recognition
  runtime: recognition
  prompt: Which expression maps a date to the start of its month?
  answer_options:
  - DATE_TRUNC('month', order_date)
  - EXTRACT(day FROM order_date)
  - CAST(order_date AS VARCHAR)
  - ORDER BY order_date
  hints:
  - Focus on how date truncation changes the result or database behavior.
  validator:
    type: exact_answer
    expected_answer: DATE_TRUNC('month', order_date)
