- activity_id: date_time_mastery
  title: Calculate customer tenure days
  type: mastery
  runtime: sql
  prompt: Return customer_id and tenure_days as the difference between DATE 2026-07-20 and signup_date. Sort by
    customer_id.
  starter: "SELECT customer_id,\n       \nFROM customers\nORDER BY customer_id;"
  solution: SELECT customer_id, DATE '2026-07-20' - signup_date AS tenure_days FROM customers ORDER BY customer_id;
  hints:
  - Start from the requested result grain, then apply date arithmetic.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT customer_id, DATE '2026-07-20' - signup_date AS tenure_days FROM customers ORDER BY customer_id;
    required_patterns:
    - DATE\s*'2026-07-20'\s*-\s*signup_date
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
