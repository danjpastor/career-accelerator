lesson_id: sql_postgres_data_types
title: Overview of Common Data Types
order: 1
difficulty: intermediate
description: Choose types based on meaning and use explicit conversion when necessary.
estimated_minutes: 24
content: lesson.md
objectives:
- Explain overview of common data types.
- Apply overview of common data types to an analyst request.
key_takeaways:
- Choose types based on meaning and use explicit conversion when necessary.
- Validate the result rather than relying only on valid syntax.
teaches:
- sql.postgres_types
requires:
- sql.window_extensions
mastery:
  passing_score: 1.0
activities:
- activity_id: pg_types_recognition
  title: Choose an identifier type
  type: recognition
  runtime: recognition
  prompt: A customer ID contains leading zeroes and is never added. Which type family is most appropriate?
  answer_options:
  - Text
  - Integer
  - Decimal measure
  - Timestamp
  hints:
  - Focus on how semantic data types changes the result or database behavior.
  validator:
    type: exact_answer
    expected_answer: Text
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 4
  presentation:
    scenario: Quick analyst decision
    introduction: Use the concept from this step to choose the strongest answer.
    task: A customer ID contains leading zeroes and is never added. Which type family is most appropriate?
    requirements:
    - Choose one answer.
    - Check your answer before continuing.
    expected_output: One correct selection.
    skills_practiced:
    - semantic data types
    after_correct: You correctly applied semantic data types to the decision.
    common_errors: []
  instruction:
    title: Choose an identifier type
    objective: Use semantic data types in a practical analyst decision.
    action_label: Choose the best answer
    body: Analysts use **semantic data types** to make database work more accurate, readable, and useful. Read the
      situation, identify what the result must preserve, and then choose the option that best matches that goal.
      This check is intentionally short so you can test the idea immediately.
  required_for_completion: true
- activity_id: pg_types_guided
  title: Convert monthly fees to whole dollars
  type: guided
  runtime: sql
  prompt: Return subscriber_id and fee_whole_dollars by casting monthly_fee to INTEGER. Sort by subscriber_id.
  starter: 'SELECT subscriber_id, CAST(monthly_fee AS INTEGER) AS fee_whole_dollars

    FROM subscriptions

    ORDER BY subscriber_id;'
  solution: SELECT subscriber_id, CAST(monthly_fee AS INTEGER) AS fee_whole_dollars FROM subscriptions ORDER BY
    subscriber_id;
  hints:
  - Identify where explicit type conversion belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT subscriber_id, CAST(monthly_fee AS INTEGER) AS fee_whole_dollars FROM subscriptions ORDER
      BY subscriber_id;
    required_patterns:
    - CAST\s*\(
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 7
  presentation:
    scenario: Original analyst practice request
    introduction: Translate the business request into a focused, reviewable SQL result.
    task: Return subscriber_id and fee_whole_dollars by casting monthly_fee to INTEGER. Sort by subscriber_id.
    tables:
    - subscriptions
    requirements:
    - Return the requested columns and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested rows and columns.
    skills_practiced:
    - explicit type conversion
    after_correct: Your query returns the requested result and uses the intended SQL pattern.
    common_errors: []
  instruction:
    title: Convert monthly fees to whole dollars
    objective: Apply explicit type conversion to a realistic analyst request.
    action_label: Write and validate the query
    body: In this step, you will use **explicit type conversion** inside a complete analyst query. Start by identifying
      the result grain—what one row should represent—then select only the fields and calculations needed to answer
      the request. Run the query, inspect the output, and check the answer when the result looks right.
  required_for_completion: true
- activity_id: pg_types_mastery
  title: Create a text version of product IDs
  type: mastery
  runtime: sql
  prompt: Return product_id and product_id_text by casting product_id to VARCHAR. Sort by product_id.
  starter: "SELECT product_id,\n       \nFROM products\nORDER BY product_id;"
  solution: SELECT product_id, CAST(product_id AS VARCHAR) AS product_id_text FROM products ORDER BY product_id;
  hints:
  - Start from the requested result grain, then apply type conversion for identifiers.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT product_id, CAST(product_id AS VARCHAR) AS product_id_text FROM products ORDER BY product_id;
    required_patterns:
    - CAST\s*\([^)]*AS\s+VARCHAR
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
  difficulty: intermediate
  estimated_minutes: 7
  presentation:
    scenario: Original analyst practice request
    introduction: Translate the business request into a focused, reviewable SQL result.
    task: Return product_id and product_id_text by casting product_id to VARCHAR. Sort by product_id.
    tables:
    - products
    requirements:
    - Return the requested columns and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested rows and columns.
    skills_practiced:
    - type conversion for identifiers
    after_correct: Your query returns the requested result and uses the intended SQL pattern.
    common_errors: []
  instruction:
