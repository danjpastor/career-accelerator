- activity_id: database_management_1_recognition
  title: 'Database Management Decisions: decision 1'
  type: recognition
  runtime: recognition
  prompt: Which principle grants users only the permissions needed for their work?
  answer_options:
  - Least privilege
  - Full access by default
  - No authentication
  - Duplicate ownership
  hints:
  - Focus on how database management decisions changes the result or database behavior.
  validator:
    type: exact_answer
    expected_answer: Least privilege
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
