    title: 'Views and Materialized Views: decision 1'
    objective: Use views and materialized views in a practical analyst decision.
    action_label: Choose the best answer
    body: Analysts use **views and materialized views** to make database work more accurate, readable, and useful.
      Read the situation, identify what the result must preserve, and then choose the option that best matches that
      goal. This check is intentionally short so you can test the idea immediately.
  required_for_completion: true
- activity_id: database_views_2_recognition
  title: 'Views and Materialized Views: decision 2'
  type: recognition
  runtime: recognition
  prompt: Why might a team use a materialized view?
  answer_options:
  - To cache an expensive result that can be refreshed
  - To remove all source tables
  - To avoid permissions entirely
  - To replace every index
  hints:
  - Focus on how views and materialized views changes the result or database behavior.
  validator:
