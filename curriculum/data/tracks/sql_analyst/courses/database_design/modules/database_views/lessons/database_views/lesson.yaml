lesson_id: database_views
title: Views and Materialized Views
order: 1
difficulty: intermediate
description: Use saved query definitions to simplify access while understanding refresh behavior.
estimated_minutes: 18
content: lesson.md
objectives:
- Explain views and materialized views.
- Choose appropriate analyst and database decisions involving views and materialized views.
key_takeaways:
- Use saved query definitions to simplify access while understanding refresh behavior.
- Choose designs based on workload, grain, integrity, and maintainability.
teaches:
- database.views
requires:
- database.schemas_normalization
mastery:
  passing_score: 1.0
activities:
- activity_id: database_views_1_recognition
  title: 'Views and Materialized Views: decision 1'
  type: recognition
  runtime: recognition
  prompt: What does a standard view normally store?
  answer_options:
  - A query definition
  - A separate permanent copy of every result row
  - A password
  - A CSV path only
  hints:
  - Focus on how views and materialized views changes the result or database behavior.
  validator:
    type: exact_answer
    expected_answer: A query definition
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 4
