lesson_id: database_schemas_normalization
title: Schemas and Normalization
order: 1
difficulty: intermediate
description: Balance integrity, duplication, readability, and analytical performance.
estimated_minutes: 18
content: lesson.md
objectives:
- Explain schemas and normalization.
- Choose appropriate analyst and database decisions involving schemas and normalization.
key_takeaways:
- Balance integrity, duplication, readability, and analytical performance.
- Choose designs based on workload, grain, integrity, and maintainability.
teaches:
- database.schemas_normalization
requires:
- database.processing_models
mastery:
  passing_score: 1.0
activities:
- activity_id: database_schemas_normalization_1_recognition
  title: 'Schemas and Normalization: decision 1'
  type: recognition
  runtime: recognition
  prompt: Which schema connects denormalized dimensions directly to a central fact table?
  answer_options:
  - Star schema
  - Snowflake schema
  - Document store
  - Flat log only
  hints:
  - Focus on how schemas and normalization changes the result or database behavior.
  validator:
    type: exact_answer
    expected_answer: Star schema
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 4
