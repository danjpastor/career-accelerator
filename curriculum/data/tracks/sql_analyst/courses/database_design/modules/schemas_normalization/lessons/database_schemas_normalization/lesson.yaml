    after_correct: You correctly applied schemas and normalization to the decision.
    common_errors: []
  instruction:
    title: 'Schemas and Normalization: decision 1'
    objective: Use schemas and normalization in a practical analyst decision.
    action_label: Choose the best answer
    body: Analysts use **schemas and normalization** to make database work more accurate, readable, and useful.
      Read the situation, identify what the result must preserve, and then choose the option that best matches that
      goal. This check is intentionally short so you can test the idea immediately.
  required_for_completion: true
