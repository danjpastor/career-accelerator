content: lesson.md
objectives:
- Explain processing, storage, and data models.
- Choose appropriate analyst and database decisions involving processing, storage, and data models.
key_takeaways:
- Choose structures that fit operational transactions or analytical reporting.
- Choose designs based on workload, grain, integrity, and maintainability.
