- activity_id: win_cp_3_question
  title: Build a running total
  type: mastery
  runtime: sql
  prompt: Return region, month_start, and running_sales, sorted by region and month_start.
  starter: ''
  solution: SELECT region, month_start, SUM(sales_total) OVER (PARTITION BY region ORDER BY month_start ROWS BETWEEN
    UNBOUNDED PRECEDING AND CURRENT ROW) AS running_sales FROM monthly_sales ORDER BY region, month_start;
  hints:
