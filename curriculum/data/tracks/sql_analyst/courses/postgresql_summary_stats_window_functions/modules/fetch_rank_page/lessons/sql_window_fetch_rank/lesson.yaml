- activity_id: win_rank_mastery
  title: Rank monthly sales
  type: mastery
  runtime: sql
  prompt: Return region, month_start, sales_total, and sales_rank using DENSE_RANK across all rows by sales_total
    descending. Sort by sales_rank and region.
  starter: "SELECT region, month_start, sales_total,\n       \nFROM monthly_sales\nORDER BY sales_rank, region;"
  solution: SELECT region, month_start, sales_total, DENSE_RANK() OVER (ORDER BY sales_total DESC) AS sales_rank
    FROM monthly_sales ORDER BY sales_rank, region;
  hints:
  - Start from the requested result grain, then apply ranking windows.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT region, month_start, sales_total, DENSE_RANK() OVER (ORDER BY sales_total DESC) AS sales_rank
      FROM monthly_sales ORDER BY sales_rank, region;
    required_patterns:
    - DENSE_RANK\s*\(\s*\)\s+OVER
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
  difficulty: intermediate
  estimated_minutes: 7
  presentation:
