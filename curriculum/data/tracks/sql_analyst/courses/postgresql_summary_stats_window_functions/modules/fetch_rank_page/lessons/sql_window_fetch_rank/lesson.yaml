- activity_id: win_rank_guided
  title: Compare each month with the prior month
  type: guided
  runtime: sql
  prompt: Return region, month_start, sales_total, and prior_sales using LAG within each region. Sort by region
    and month_start.
  starter: "SELECT region, month_start, sales_total,\n       LAG(sales_total) OVER (PARTITION BY region ORDER BY\
    \ month_start) AS prior_sales\nFROM monthly_sales\nORDER BY region, month_start;"
  solution: SELECT region, month_start, sales_total, LAG(sales_total) OVER (PARTITION BY region ORDER BY month_start)
    AS prior_sales FROM monthly_sales ORDER BY region, month_start;
  hints:
  - Identify where LAG comparisons belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT region, month_start, sales_total, LAG(sales_total) OVER (PARTITION BY region ORDER BY
      month_start) AS prior_sales FROM monthly_sales ORDER BY region, month_start;
    required_patterns:
    - LAG\s*\(
    - PARTITION\s+BY\s+region
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
