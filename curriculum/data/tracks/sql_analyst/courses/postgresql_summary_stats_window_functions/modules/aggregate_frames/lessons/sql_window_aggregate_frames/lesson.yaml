- activity_id: win_frame_mastery
  title: Calculate a two-period moving average
  type: mastery
  runtime: sql
  prompt: Return region, month_start, and moving_average using the current and previous sales rows within each region,
    rounded to 2 decimals. Sort by region and month_start.
  starter: "SELECT region, month_start,\n       \nFROM monthly_sales\nORDER BY region, month_start;"
  solution: SELECT region, month_start, ROUND(AVG(sales_total) OVER (PARTITION BY region ORDER BY month_start ROWS
    BETWEEN 1 PRECEDING AND CURRENT ROW), 2) AS moving_average FROM monthly_sales ORDER BY region, month_start;
  hints:
  - Start from the requested result grain, then apply moving averages.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT region, month_start, ROUND(AVG(sales_total) OVER (PARTITION BY region ORDER BY month_start
      ROWS BETWEEN 1 PRECEDING AND CURRENT ROW), 2) AS moving_average FROM monthly_sales ORDER BY region, month_start;
    required_patterns:
    - AVG\s*\([^)]*\)\s+OVER
    - 1\s+PRECEDING
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
