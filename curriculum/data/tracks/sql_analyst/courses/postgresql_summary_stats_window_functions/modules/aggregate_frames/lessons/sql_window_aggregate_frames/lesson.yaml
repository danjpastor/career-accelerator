- activity_id: win_frame_guided
  title: Calculate running regional sales
  type: guided
  runtime: sql
  prompt: Return region, month_start, sales_total, and running_sales using SUM within region ordered by month_start.
    Sort by region and month_start.
  starter: "SELECT region, month_start, sales_total,\n       SUM(sales_total) OVER (PARTITION BY region ORDER BY\
    \ month_start ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_sales\nFROM monthly_sales\nORDER\
    \ BY region, month_start;"
  solution: SELECT region, month_start, sales_total, SUM(sales_total) OVER (PARTITION BY region ORDER BY month_start
    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_sales FROM monthly_sales ORDER BY region, month_start;
  hints:
  - Identify where running totals belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT region, month_start, sales_total, SUM(sales_total) OVER (PARTITION BY region ORDER BY
      month_start ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_sales FROM monthly_sales ORDER BY
      region, month_start;
    required_patterns:
    - SUM\s*\([^)]*\)\s+OVER
    - ROWS\s+BETWEEN
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
