- activity_id: win_basic_guided
  title: Add a regional average
  type: guided
  runtime: sql
  prompt: Return order_id, region, order_total, and regional_average rounded to 2 decimals. Sort by order_id.
  starter: "SELECT order_id, region, order_total,\n       ROUND(AVG(order_total) OVER (PARTITION BY region), 2)\
    \ AS regional_average\nFROM orders\nORDER BY order_id;"
  solution: SELECT order_id, region, order_total, ROUND(AVG(order_total) OVER (PARTITION BY region), 2) AS regional_average
    FROM orders ORDER BY order_id;
  hints:
  - Identify where partitioned window averages belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, region, order_total, ROUND(AVG(order_total) OVER (PARTITION BY region), 2)
      AS regional_average FROM orders ORDER BY order_id;
    required_patterns:
    - AVG\s*\([^)]*\)\s+OVER
    - PARTITION\s+BY\s+region
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
