- activity_id: win_basic_mastery
  title: Number orders within each region
  type: mastery
  runtime: sql
  prompt: Return order_id, region, and regional_order_number using ROW_NUMBER ordered by order_date within each
    region. Sort by region and regional_order_number.
  starter: "SELECT order_id, region,\n       \nFROM orders\nORDER BY region, regional_order_number;"
  solution: SELECT order_id, region, ROW_NUMBER() OVER (PARTITION BY region ORDER BY order_date) AS regional_order_number
    FROM orders ORDER BY region, regional_order_number;
  hints:
  - Start from the requested result grain, then apply ROW_NUMBER with partitions.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, region, ROW_NUMBER() OVER (PARTITION BY region ORDER BY order_date) AS regional_order_number
      FROM orders ORDER BY region, regional_order_number;
    required_patterns:
    - ROW_NUMBER\s*\(\s*\)\s+OVER
    - PARTITION\s+BY\s+region
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
