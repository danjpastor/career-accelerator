- activity_id: win_beyond_mastery
  title: Create regional and status subtotals
  type: mastery
  runtime: sql
  prompt: Return region, status, and order_count using GROUPING SETS for (region,status), (region), and grand total.
    Order by region NULLS LAST, status NULLS LAST.
  starter: "SELECT region, status,\n       \nFROM orders\nGROUP BY GROUPING SETS ((region, status), (region), ())\n\
    ORDER BY region NULLS LAST, status NULLS LAST;"
  solution: SELECT region, status, COUNT(*) AS order_count FROM orders GROUP BY GROUPING SETS ((region, status),
    (region), ()) ORDER BY region NULLS LAST, status NULLS LAST;
  hints:
  - Start from the requested result grain, then apply subtotal grouping sets.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT region, status, COUNT(*) AS order_count FROM orders GROUP BY GROUPING SETS ((region,
      status), (region), ()) ORDER BY region NULLS LAST, status NULLS LAST;
    required_patterns:
    - GROUPING\s+SETS
    - COUNT\s*\(
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
