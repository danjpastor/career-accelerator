- activity_id: win_beyond_guided
  title: Pivot order statuses by region
  type: guided
  runtime: sql
  prompt: Return region, completed_orders, and processing_orders using conditional counts. Sort by region.
  starter: "SELECT region,\n       SUM(CASE WHEN status = 'Completed' THEN 1 ELSE 0 END) AS completed_orders,\n\
    \       SUM(CASE WHEN status = 'Processing' THEN 1 ELSE 0 END) AS processing_orders\nFROM orders\nGROUP BY region\n\
    ORDER BY region;"
  solution: SELECT region, SUM(CASE WHEN status = 'Completed' THEN 1 ELSE 0 END) AS completed_orders, SUM(CASE WHEN
    status = 'Processing' THEN 1 ELSE 0 END) AS processing_orders FROM orders GROUP BY region ORDER BY region;
  hints:
  - Identify where conditional pivoting belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT region, SUM(CASE WHEN status = 'Completed' THEN 1 ELSE 0 END) AS completed_orders, SUM(CASE
      WHEN status = 'Processing' THEN 1 ELSE 0 END) AS processing_orders FROM orders GROUP BY region ORDER BY region;
    required_patterns:
    - SUM\s*\(\s*CASE
    - GROUP\s+BY\s+region
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
