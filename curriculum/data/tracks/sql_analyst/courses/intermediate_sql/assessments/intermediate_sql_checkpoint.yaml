- activity_id: int_cp_2_question
  title: Create a price band
  type: mastery
  runtime: sql
  prompt: 'Return product_id and price_band: Premium for unit_price >= 25, otherwise Standard. Sort by product_id.'
  starter: ''
  solution: SELECT product_id, CASE WHEN unit_price >= 25 THEN 'Premium' ELSE 'Standard' END AS price_band FROM
    products ORDER BY product_id;
  hints:
