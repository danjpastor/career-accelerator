      the result grain—what one row should represent—then select only the fields and calculations needed to answer
      the request. Run the query, inspect the output, and check the answer when the result looks right.
  required_for_completion: true
- activity_id: cond_transform_mastery
  title: Label inventory stock risk
  type: mastery
  runtime: sql
  prompt: 'Return sku and stock_risk: Reorder for units_on_hand < reorder_level, otherwise OK. Sort by sku.'
  starter: "SELECT sku,\n       \nFROM inventory\nORDER BY sku;"
  solution: SELECT sku, CASE WHEN units_on_hand < reorder_level THEN 'Reorder' ELSE 'OK' END AS stock_risk FROM
    inventory ORDER BY sku;
  hints:
  - Start from the requested result grain, then apply business-rule labels.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT sku, CASE WHEN units_on_hand < reorder_level THEN 'Reorder' ELSE 'OK' END AS stock_risk
      FROM inventory ORDER BY sku;
    required_patterns:
    - CASE\s+WHEN
    - units_on_hand\s*<\s*reorder_level
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
