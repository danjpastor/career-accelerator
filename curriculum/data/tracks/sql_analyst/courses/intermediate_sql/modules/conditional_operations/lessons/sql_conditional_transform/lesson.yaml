- activity_id: cond_transform_guided
  title: Label order value bands
  type: guided
  runtime: sql
  prompt: 'Return order_id and value_band: High for totals >= 175, Medium for totals >= 100, otherwise Low. Sort
    by order_id.'
  starter: "SELECT order_id,\n       CASE\n       END AS value_band\nFROM orders\nORDER BY order_id;"
  solution: SELECT order_id, CASE WHEN order_total >= 175 THEN 'High' WHEN order_total >= 100 THEN 'Medium' ELSE
    'Low' END AS value_band FROM orders ORDER BY order_id;
  hints:
  - Identify where conditional transformation belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, CASE WHEN order_total >= 175 THEN 'High' WHEN order_total >= 100 THEN 'Medium'
      ELSE 'Low' END AS value_band FROM orders ORDER BY order_id;
    required_patterns:
    - CASE\s+WHEN
    - ELSE
    - END\s+AS
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 7
  presentation:
