- activity_id: multi_cond_guided
  title: Find unresolved critical tickets
  type: guided
  runtime: sql
  prompt: Return ticket_id, priority, and status for Open or Pending tickets that are High or Urgent. Sort by ticket_id.
  starter: "SELECT ticket_id, priority, status\nFROM support_tickets\nWHERE \nORDER BY ticket_id;"
  solution: SELECT ticket_id, priority, status FROM support_tickets WHERE status IN ('Open', 'Pending') AND priority
    IN ('High', 'Urgent') ORDER BY ticket_id;
  hints:
  - Identify where multiple filter conditions belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT ticket_id, priority, status FROM support_tickets WHERE status IN ('Open', 'Pending')
      AND priority IN ('High', 'Urgent') ORDER BY ticket_id;
    required_patterns:
    - status\s+IN
    - priority\s+IN
    - \bAND\b
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 7
  presentation:
    scenario: Original analyst practice request
    introduction: Translate the business request into a focused, reviewable SQL result.
    task: Return ticket_id, priority, and status for Open or Pending tickets that are High or Urgent. Sort by ticket_id.
    tables:
    - support_tickets
    requirements:
    - Return the requested columns and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested rows and columns.
    skills_practiced:
    - multiple filter conditions
    after_correct: Your query returns the requested result and uses the intended SQL pattern.
    common_errors: []
  instruction:
    title: Find unresolved critical tickets
    objective: Apply multiple filter conditions to a realistic analyst request.
    action_label: Write and validate the query
    body: In this step, you will use **multiple filter conditions** inside a complete analyst query. Start by identifying
      the result grain—what one row should represent—then select only the fields and calculations needed to answer
      the request. Run the query, inspect the output, and check the answer when the result looks right.
  required_for_completion: true
- activity_id: multi_cond_mastery
  title: Filter active higher-value subscriptions
  type: mastery
  runtime: sql
  prompt: Return subscriber_id, plan_name, and monthly_fee for Active or Trial subscriptions costing at least 29.
    Sort by subscriber_id.
  starter: "SELECT subscriber_id, plan_name, monthly_fee\nFROM subscriptions\nWHERE \nORDER BY subscriber_id;"
  solution: SELECT subscriber_id, plan_name, monthly_fee FROM subscriptions WHERE status IN ('Active', 'Trial')
    AND monthly_fee >= 29 ORDER BY subscriber_id;
  hints:
  - Start from the requested result grain, then apply combined business filters.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT subscriber_id, plan_name, monthly_fee FROM subscriptions WHERE status IN ('Active', 'Trial')
      AND monthly_fee >= 29 ORDER BY subscriber_id;
    required_patterns:
    - status\s+IN
    - monthly_fee\s*>=\s*29
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
  difficulty: intermediate
  estimated_minutes: 7
  presentation:
    scenario: Original analyst practice request
    introduction: Translate the business request into a focused, reviewable SQL result.
    task: Return subscriber_id, plan_name, and monthly_fee for Active or Trial subscriptions costing at least 29.
      Sort by subscriber_id.
    tables:
    - subscriptions
    requirements:
    - Return the requested columns and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested rows and columns.
    skills_practiced:
    - combined business filters
    after_correct: Your query returns the requested result and uses the intended SQL pattern.
    common_errors: []
  instruction:
