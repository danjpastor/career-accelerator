    subscriber_id.
  starter: "SELECT subscriber_id,\n       \nFROM subscriptions\nORDER BY subscriber_id;"
  solution: SELECT subscriber_id, ROUND(monthly_fee * 12, 2) AS annual_value FROM subscriptions ORDER BY subscriber_id;
