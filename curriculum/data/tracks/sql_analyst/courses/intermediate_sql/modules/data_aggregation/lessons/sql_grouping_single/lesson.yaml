- activity_id: group_one_guided
  title: Count products by category
  type: guided
  runtime: sql
  prompt: Return category and product_count from products, sorted by category.
  starter: "SELECT category,\n       COUNT(*) AS product_count\nFROM products\nGROUP BY category\nORDER BY category;"
  solution: SELECT category, COUNT(*) AS product_count FROM products GROUP BY category ORDER BY category;
  hints:
  - Identify where single-column grouping belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT category, COUNT(*) AS product_count FROM products GROUP BY category ORDER BY category;
    required_patterns:
    - COUNT\s*\(
    - GROUP\s+BY\s+category
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 7
  presentation:
    scenario: Original analyst practice request
    introduction: Translate the business request into a focused, reviewable SQL result.
    task: Return category and product_count from products, sorted by category.
    tables:
    - products
    requirements:
    - Return the requested columns and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested rows and columns.
    skills_practiced:
    - single-column grouping
    after_correct: Your query returns the requested result and uses the intended SQL pattern.
    common_errors: []
  instruction:
    title: Count products by category
    objective: Apply single-column grouping to a realistic analyst request.
    action_label: Write and validate the query
    body: In this step, you will use **single-column grouping** inside a complete analyst query. Start by identifying
      the result grain—what one row should represent—then select only the fields and calculations needed to answer
      the request. Run the query, inspect the output, and check the answer when the result looks right.
  required_for_completion: true
- activity_id: group_one_mastery
  title: Average price by category
  type: mastery
  runtime: sql
  prompt: Return category and average_unit_price rounded to 2 decimals, sorted by category.
  starter: "SELECT category,\n       \nFROM products\nGROUP BY category\nORDER BY category;"
  solution: SELECT category, ROUND(AVG(unit_price), 2) AS average_unit_price FROM products GROUP BY category ORDER
    BY category;
  hints:
  - Start from the requested result grain, then apply single-column grouped averages.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT category, ROUND(AVG(unit_price), 2) AS average_unit_price FROM products GROUP BY category
      ORDER BY category;
    required_patterns:
    - AVG\s*\(
    - GROUP\s+BY\s+category
    forbidden_patterns: []
