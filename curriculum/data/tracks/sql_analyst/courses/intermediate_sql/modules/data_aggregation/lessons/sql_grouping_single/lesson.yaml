  title: Choose the grouping grain
  type: recognition
  runtime: recognition
  prompt: A result needs one row per product category. Which clause establishes that grain?
  answer_options:
  - GROUP BY category
  - ORDER BY category
  - WHERE category
  - LIMIT category
  hints:
  - Focus on how grouping by one category changes the result or database behavior.
  validator:
    type: exact_answer
    expected_answer: GROUP BY category
