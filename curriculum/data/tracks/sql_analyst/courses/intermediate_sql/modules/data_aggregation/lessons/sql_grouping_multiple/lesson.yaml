- activity_id: group_multi_recognition
  title: Identify the result grain
  type: recognition
  runtime: recognition
  prompt: A query groups by region and status. What does one result row represent?
  answer_options:
  - One region-status combination
  - One order
  - One region only
  - One status only
  hints:
  - Focus on how multi-dimensional grouping changes the result or database behavior.
  validator:
    type: exact_answer
    expected_answer: One region-status combination
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 4
  presentation:
    scenario: Quick analyst decision
    introduction: Use the concept from this step to choose the strongest answer.
    task: A query groups by region and status. What does one result row represent?
    requirements:
    - Choose one answer.
    - Check your answer before continuing.
    expected_output: One correct selection.
    skills_practiced:
    - multi-dimensional grouping
    after_correct: You correctly applied multi-dimensional grouping to the decision.
    common_errors: []
  instruction:
    title: Identify the result grain
    objective: Use multi-dimensional grouping in a practical analyst decision.
    action_label: Choose the best answer
    body: Analysts use **multi-dimensional grouping** to make database work more accurate, readable, and useful.
      Read the situation, identify what the result must preserve, and then choose the option that best matches that
      goal. This check is intentionally short so you can test the idea immediately.
  required_for_completion: true
- activity_id: group_multi_guided
  title: Count orders by region and status
  type: guided
  runtime: sql
  prompt: Return region, status, and order_count, sorted by region and status.
  starter: "SELECT region, status,\n       COUNT(*) AS order_count\nFROM orders\nGROUP BY region, status\nORDER\
    \ BY region, status;"
  solution: SELECT region, status, COUNT(*) AS order_count FROM orders GROUP BY region, status ORDER BY region,
    status;
  hints:
  - Identify where multiple grouping columns belongs in the query.
  - Build the query one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT region, status, COUNT(*) AS order_count FROM orders GROUP BY region, status ORDER BY
      region, status;
    required_patterns:
    - GROUP\s+BY\s+region\s*,\s*status
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 7
  presentation:
