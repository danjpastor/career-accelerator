lesson_id: sql_transformations
title: Transforming Values with CASE and CAST
order: 2
difficulty: intermediate
description: Create derived values and deliberately control result data types.
estimated_minutes: 28
content: lesson.md
objectives:
- Explain transforming values with case and cast.
- Apply transforming values with case and cast to an analyst request.
key_takeaways:
- Create derived values and deliberately control result data types.
- Validate the result rather than relying only on query syntax.
teaches:
- sql.transformations
requires:
- sql.aggregations
mastery:
  passing_score: 1.0
activities:
