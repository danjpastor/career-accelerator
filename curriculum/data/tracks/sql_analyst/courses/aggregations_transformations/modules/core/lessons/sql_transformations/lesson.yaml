  title: Choose a transformation tool
  type: recognition
  runtime: recognition
  prompt: Which expression assigns labels based on conditions?
  answer_options:
  - CASE
  - GROUP BY
  - ORDER BY
  - DISTINCT
  hints: []
  validator:
    type: exact_answer
    expected_answer: CASE
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 4
  presentation:
    scenario: Quick knowledge check
    introduction: Use the idea you just reviewed to choose the strongest answer.
    task: Which expression assigns labels based on conditions?
    requirements:
    - Choose one answer.
    - Check your answer before continuing.
    expected_output: One correct selection.
    skills_practiced:
    - Transform values without changing source data
    after_correct: You identified the core idea behind transform values without changing source data.
    common_errors: []
  instruction:
    title: Transform values without changing source data
    objective: Build a practical understanding of transform values without changing source data.
    action_label: Choose the best answer
    body: '`CASE` creates derived categories inside a query. `CAST` converts a value to a different data type for
      calculation or presentation.'
  required_for_completion: true
- activity_id: transform_guided
  title: Create product price bands
  type: guided
  runtime: sql
  prompt: Return product_id, product_name, and a price_band of 'Premium' when unit_price is at least 30, otherwise
    'Standard'. Sort by product_id.
  starter: "SELECT product_id, product_name,\n       -- create price_band\nFROM products\nORDER BY product_id;"
  solution: SELECT product_id, product_name, CASE WHEN unit_price >= 30 THEN 'Premium' ELSE 'Standard' END AS price_band
    FROM products ORDER BY product_id;
  hints:
  - Focus on CASE.
  - Build the result one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT product_id, product_name, CASE WHEN unit_price >= 30 THEN 'Premium' ELSE 'Standard' END
      AS price_band FROM products ORDER BY product_id;
    required_patterns:
    - CASE\s+WHEN
    - END\s+AS
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: true
  required_for_mastery: false
  evidence_eligible: false
  difficulty: beginner
  estimated_minutes: 7
  presentation:
    scenario: Analyst practice request
    introduction: Translate the request into a clear, reviewable SQL result.
    task: Return product_id, product_name, and a price_band of 'Premium' when unit_price is at least 30, otherwise
      'Standard'. Sort by product_id.
    tables:
    - products
    requirements:
    - Return the requested fields and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested columns.
    skills_practiced:
    - CASE
    after_correct: Your query returns the requested result and uses the intended SQL pattern.
    common_errors: []
  instruction:
    title: Create a reusable business category
    objective: Use CASE in a realistic analyst query.
    action_label: Write and validate the query
    body: A searched `CASE` evaluates conditions in order and returns the value associated with the first true condition.
  required_for_completion: true
- activity_id: transform_mastery
  title: Convert order totals for an integer export
  type: mastery
  runtime: sql
  prompt: Return order_id and order_total cast as INTEGER under the alias whole_dollars, sorted by order_id.
  starter: 'SELECT order_id,

    FROM orders

    ORDER BY order_id;'
  solution: SELECT order_id, CAST(order_total AS INTEGER) AS whole_dollars FROM orders ORDER BY order_id;
  hints:
  - Focus on CAST.
  - Build the result one clause at a time.
  validator:
    type: sql_result
    dataset_id: sql_foundations
    expected_query: SELECT order_id, CAST(order_total AS INTEGER) AS whole_dollars FROM orders ORDER BY order_id;
    required_patterns:
    - CAST\s*\(
    - AS\s+INTEGER
    forbidden_patterns: []
    order_sensitive: true
    column_sensitive: true
  required_for_practice: false
  required_for_mastery: true
  evidence_eligible: true
  difficulty: intermediate
  estimated_minutes: 9
  presentation:
    scenario: Analyst practice request
    introduction: Translate the request into a clear, reviewable SQL result.
    task: Return order_id and order_total cast as INTEGER under the alias whole_dollars, sorted by order_id.
    tables:
    - orders
    requirements:
    - Return the requested fields and metrics.
    - Keep the result readable and deterministic.
    expected_output: A validated result with the requested columns.
    skills_practiced:
    - CAST
    after_correct: Your query returns the requested result and uses the intended SQL pattern.
    common_errors: []
  instruction:
    title: Control output data types
    objective: Use CAST in a realistic analyst query.
    action_label: Write and validate the query
    body: Use explicit conversion when a downstream export requires a specific type. Remember that integer conversion
      can remove decimal precision.
  required_for_completion: true
