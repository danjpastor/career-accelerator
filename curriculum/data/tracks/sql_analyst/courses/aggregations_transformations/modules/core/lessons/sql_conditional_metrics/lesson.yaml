lesson_id: sql_conditional_metrics
title: Conditional Business Metrics
order: 4
difficulty: intermediate
description: Calculate business-specific measures without losing the intended result grain.
estimated_minutes: 28
content: lesson.md
objectives:
- Explain conditional business metrics.
- Apply conditional business metrics to an analyst request.
key_takeaways:
- Calculate business-specific measures without losing the intended result grain.
- Validate the result rather than relying only on query syntax.
